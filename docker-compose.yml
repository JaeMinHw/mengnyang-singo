
services:
  db:
    image: mysql:8.0
    container_name: mengnyang-db
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: mengnyang
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # === 백엔드 서비스 (Blue/Green) ===
  app-blue:
    build: 
      context: ./backend
    container_name: mengnyang-blue
    environment:
      - APP_VERSION=v1
      - DATABASE_URL=mysql+pymysql://root:root1234@db:3306/mengnyang
    expose:
      - "8080" # Nginx를 통해서만 접근하므로 expose 사용
    depends_on:
      db: { condition: service_healthy }
    restart: always

  app-green:
    build:
      context: ./backend
    container_name: mengnyang-green
    environment:
      - APP_VERSION=v2
      - DATABASE_URL=mysql+pymysql://root:root1234@db:3306/mengnyang
    expose:
      - "8080"
    depends_on:
      db: { condition: service_healthy }
    profiles:
      - green
    restart: always

  # === 프론트엔드 서비스 추가 ===
  app-frontend:
    build: # build는 한 번만!
      context: ./frontend
      args:
        NEXT_PUBLIC_KAKAO_MAP_API_KEY: ${NEXT_PUBLIC_KAKAO_MAP_API_KEY}
    container_name: mengnyang-frontend
    environment:
      - NEXT_PUBLIC_KAKAO_MAP_API_KEY=${NEXT_PUBLIC_KAKAO_MAP_API_KEY}
    expose:
      - "3000"
    restart: always

  # === Nginx 서비스 ===
  nginx:
    image: nginx:latest
    container_name: mengnyang-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app-blue
      - app-frontend
    restart: always

volumes:
  db-data: