version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mengnyang-db
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: mengnyang
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app-blue:
    build: ./backend
    container_name: mengnyang-blue
    ports:
      - "8081:8080"
    environment:
      - APP_VERSION=v1
      - DATABASE_URL=mysql+pymysql://root:root1234@db:3306/mengnyang
    depends_on:
      db:
        condition: service_healthy

  app-green:
    build: ./backend
    container_name: mengnyang-green
    ports:
      - "8082:8080"
    environment:
      - APP_VERSION=v2
      - DATABASE_URL=mysql+pymysql://root:root1234@db:3306/mengnyang
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - green

  nginx:
    image: nginx:latest
    container_name: mengnyang-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app-blue

volumes:
  db-data: