events {
    worker_connections 1024;
}

http {
    upstream backend_servers {
    server app-blue:8080;
}

    upstream frontend_server {
        server mengnyang-frontend:3000;
    }

    server {
        listen 80;

        # --- ???濚밸Þ??猷⑥땡? ?μ떝?띄몭??袁㏉떋???????뉖????怨쀫뮝力???????낆젵 ---
        # /api/ ????癲ル슢??節녿쨨???棺堉?댆洹ⓦ럹??轅붽틓??熬곥끇釉???????거?????轅붽틓??影?뽧걤???癲ル슢?????
        location /api/ {
            # proxy_pass ????용츧????????μ쪚???????/)?????嫄?????ы꺍?? ?????ㅼ쭋椰꾊낆녇?
            # Nginx???ル봿?? ???癲????????/api/ ????뉖????怨쀫뮝力?????怨뚰뇠???떐????롪퍓肉????ш끽維뽳쭩?????癲ル슢캉??꿸괴 ?????밸븶????癲ル슢?????
            proxy_pass http://backend_servers;

            proxy_set_header Host $host;
