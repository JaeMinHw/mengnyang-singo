events {
    worker_connections 1024;
}

http {
    # 백엔드 서버 그룹 (Blue/Green 용)
    upstream backend_servers {
        server mengnyang-blue:8080;
        # server mengnyang-green:8080; # 나중에 v2 배포 시 사용
    }

    # 프론트엔드 서버 그룹
    upstream frontend_server {
        server mengnyang-frontend:3000;
    }

    server {
        listen 80;

        # 1. API 요청 처리 (/api/...)
        location /api/ { # 뒤에 슬래시(/)를 추가합니다.
            # rewrite 지시어 삭제
            
            # proxy_pass 주소 뒤에도 슬래시(/)를 추가합니다.
            proxy_pass http://backend_servers/; 
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 2. 나머지 모든 요청 처리 (프론트엔드)
        location / {
            proxy_pass http://frontend_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # WebSocket 지원을 위한 설정 (Next.js 개발 모드에 필요)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}